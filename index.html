*{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0D1F35;
  --prussian:#1B3A5C;
  --cobalt:#1B4F8A;
  --sky:#5B9EC9;
  --ivory:#F5F0E8;
  --warm:#EDE4D0;
  --paper:#F8F4EC;
  --wheat:#D4943A;
  --wheat-soft:#E8B96A;
  --straw:#F5D48A;
  --conflict:#B85450;
  --conflict-soft:#D4827E;
  --teal:#1A6B58;
  --sage:#3D8B72;
  --sage-soft:#7CBFAB;
  --storm:#6B4B7A;
  --text-primary:#1A1614;
  --text-secondary:#5A5450;
  --text-tertiary:#8A8480;
  --border:#DDD8CE;
}

html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--text-primary);-webkit-font-smoothing:antialiased}

.hero{position:relative;background:var(--navy);padding:56px 48px 48px;overflow:hidden}

.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(91,158,201,.06) 1px, transparent 1px),linear-gradient(90deg, rgba(91,158,201,.06) 1px, transparent 1px);background-size:48px 48px;pointer-events:none}

.hero-grid::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 40%, rgba(27,79,138,.4) 0%, transparent 70%)}

.hero-inner{position:relative;z-index:1;max-width:900px}

.hero-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.eyebrow-line{width:28px;height:1px;background:var(--wheat)}
.eyebrow-text{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--wheat-soft)}

.hero-title{font-size:clamp(26px,4vw,42px);font-weight:300;color:var(--ivory);line-height:1.15;letter-spacing:-.02em;margin-bottom:16px;max-width:640px}
.hero-title em{font-style:normal;color:var(--wheat-soft);font-weight:400}

.hero-desc{font-size:14px;font-weight:300;color:rgba(245,240,232,.5);line-height:1.75;max-width:520px;margin-bottom:28px}

.hero-meta{display:flex;align-items:center;gap:24px;padding-top:20px;border-top:0.5px solid rgba(255,255,255,.08);flex-wrap:wrap}
.meta-item{font-size:11px;color:rgba(245,240,232,.35);letter-spacing:.04em}
.meta-item strong{display:block;font-size:12px;font-weight:500;color:rgba(245,240,232,.75);letter-spacing:.01em;margin-bottom:1px}

.hero-accent{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg, var(--wheat) 0%, transparent 60%)}

.triptych{display:grid;grid-template-columns:1fr 1fr 1fr;min-height:420px}

.p1{background:var(--prussian);padding:28px 28px 32px;border-right:0.5px solid rgba(255,255,255,.06)}
.p2{background:var(--paper);padding:28px 28px 32px;border-right:0.5px solid var(--border)}
.p3{background:var(--teal);padding:28px 28px 32px}

.panel-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:400;text-transform:uppercase;letter-spacing:.12em;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.p1 .panel-label{color:rgba(245,240,232,.35)}
.p2 .panel-label{color:var(--text-tertiary)}
.p3 .panel-label{color:rgba(245,240,232,.4)}
.panel-label-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.p1 .panel-label-dot{background:var(--sky)}
.p2 .panel-label-dot{background:var(--wheat)}
.p3 .panel-label-dot{background:rgba(245,240,232,.5)}

.risk-list{display:flex;flex-direction:column;gap:2px}
.risk-item{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,.05)}
.risk-item:last-child{border-bottom:none}
.risk-name{font-size:12px;font-weight:400;color:rgba(245,240,232,.8)}
.risk-sub{font-size:10px;color:rgba(245,240,232,.3);margin-top:1px}
.risk-right{display:flex;align-items:center;gap:8px}
.risk-bar-track{width:56px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.risk-bar-fill{height:100%;border-radius:2px}
